name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        shell: bash
        run: |
          extra_args=()
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            extra_args+=("-DHX_CLOG_ENABLE_SYSLOG=ON")
          fi
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DHX_CLOG_BUILD_EXAMPLES=ON \
            -DHX_CLOG_BUILD_TESTS=ON \
            "${extra_args[@]}"

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test
        run: ctest --test-dir build -C ${{ matrix.build_type }} --output-on-failure

  packaging-smoke:
    name: Install package smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DHX_CLOG_BUILD_EXAMPLES=OFF \
            -DHX_CLOG_BUILD_TESTS=OFF \
            -DHX_CLOG_ENABLE_SYSLOG=ON \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install"

      - name: Build and install
        run: |
          cmake --build build --config Release --parallel
          cmake --install build --config Release

      - name: Verify installed package
        shell: bash
        run: |
          test -f install/include/hx_clog.h
          test -f install/lib/cmake/hx_clog/hx_clogConfig.cmake
