name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Debug, Release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        shell: bash
        run: |
          extra_args=()
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            extra_args+=("-DHX_CLOG_ENABLE_SYSLOG=ON")
          fi
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DHX_CLOG_BUILD_EXAMPLES=ON \
            -DHX_CLOG_BUILD_TESTS=ON \
            "${extra_args[@]}"

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }} --parallel

      - name: Test
        run: ctest --test-dir build -C ${{ matrix.build_type }} --output-on-failure

  linux-arm:
    name: ubuntu-arm64 / Release
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DHX_CLOG_BUILD_EXAMPLES=ON \
            -DHX_CLOG_BUILD_TESTS=ON \
            -DHX_CLOG_ENABLE_SYSLOG=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  sanitizers:
    name: ${{ matrix.sanitizer }} sanitizer
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sanitizer: address-undefined
            flags: "-fsanitize=address,undefined -fno-sanitize-recover=all -g"
          - sanitizer: thread
            flags: "-fsanitize=thread -g"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DHX_CLOG_BUILD_EXAMPLES=OFF \
            -DHX_CLOG_BUILD_TESTS=ON \
            -DCMAKE_C_FLAGS="${{ matrix.flags }}" \
            -DCMAKE_CXX_FLAGS="${{ matrix.flags }}" \
            -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.flags }}"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  options-matrix:
    name: options ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: no-async
            args: "-DHX_CLOG_ENABLE_ASYNC=OFF"
          - name: no-crash
            args: "-DHX_CLOG_ENABLE_CRASH=OFF"
          - name: no-async-no-crash-no-zlib
            args: "-DHX_CLOG_ENABLE_ASYNC=OFF -DHX_CLOG_ENABLE_CRASH=OFF -DHX_CLOG_ENABLE_ZLIB=OFF"
          - name: shared
            args: "-DHX_CLOG_BUILD_SHARED=ON"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DHX_CLOG_BUILD_EXAMPLES=ON \
            -DHX_CLOG_BUILD_TESTS=ON \
            ${{ matrix.args }}

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  packaging-smoke:
    name: Install package smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DHX_CLOG_BUILD_EXAMPLES=OFF \
            -DHX_CLOG_BUILD_TESTS=OFF \
            -DHX_CLOG_ENABLE_SYSLOG=ON \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install"

      - name: Build and install
        run: |
          cmake --build build --config Release --parallel
          cmake --install build --config Release

      - name: Verify installed package
        shell: bash
        run: |
          test -f install/include/hx_clog.h
          test -f install/lib/cmake/hx_clog/hx_clogConfig.cmake

  mobile-smoke:
    name: ${{ matrix.platform }} smoke build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: Android arm64-v8a
            os: ubuntu-latest
          - platform: iOS arm64
            os: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Android
        if: matrix.platform == 'Android arm64-v8a'
        shell: bash
        run: |
          ndk="${ANDROID_NDK_HOME:-${ANDROID_NDK_ROOT:-}}"
          if [[ -z "$ndk" ]]; then
            ndk="$(find "${ANDROID_HOME}/ndk" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
          fi
          test -n "$ndk"
          cmake -S . -B build-android \
            -DCMAKE_TOOLCHAIN_FILE="${ndk}/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DHX_CLOG_BUILD_EXAMPLES=OFF \
            -DHX_CLOG_BUILD_TESTS=OFF

      - name: Build Android
        if: matrix.platform == 'Android arm64-v8a'
        run: cmake --build build-android --parallel

      - name: Configure iOS
        if: matrix.platform == 'iOS arm64'
        run: |
          cmake -S . -B build-ios -G Xcode \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DHX_CLOG_BUILD_EXAMPLES=OFF \
            -DHX_CLOG_BUILD_TESTS=OFF

      - name: Build iOS
        if: matrix.platform == 'iOS arm64'
        run: cmake --build build-ios --config Release --parallel
